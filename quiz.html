<button onclick="answer('A','B')">Information Computer Technology</button>
<button onclick="answer('B','B')">Information and Communication Technology</button>

<button onclick="answer('A','C')">Education</button>
<button onclick="answer('B','C')">Banking</button>

<button onclick="answer('A','A')">Fast communication</button>
<button onclick="answer('B','A')">High cost</button>
