<!DOCTYPE html>
<html>
<head>
<title>ICT Quiz</title>

<style>

body{
font-family:Arial;
background:#0b2a4a;
color:white;
text-align:center;
}

.quiz-box{
background:white;
color:black;
width:60%;
margin:40px auto;
padding:20px;
border-radius:8px;
}

button{
display:block;
width:70%;
margin:10px auto;
padding:10px;
font-size:16px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.result{
font-size:20px;
margin-top:20px;
color:green;
}

</style>

<script>

let score = 0;

let params = new URLSearchParams(window.location.search);
let lesson = params.get("lesson");

window.onload = function(){

// Lesson 1 Quiz
if(lesson === "Concept of ICT"){

document.getElementById("quizTitle").innerHTML = "Lesson 1 Quiz";

document.getElementById("quiz").innerHTML = `

<h3>1. What does ICT stand for?</h3>
<button onclick="answer('A','B')">Information Computer Technology</button>
<button onclick="answer('B','B')">Information and Communication Technology</button>

<h3>2. Which is NOT ICT component?</h3>
<button onclick="answer('A','C')">Hardware</button>
<button onclick="answer('B','C')">Software</button>
<button onclick="answer('C','C')">Weather</button>

`;
}

// Lesson 2 Quiz
else if(lesson === "Computer System"){

document.getElementById("quizTitle").innerHTML = "Lesson 2 Quiz";

document.getElementById("quiz").innerHTML = `

<h3>1. What is hardware?</h3>
<button onclick="answer('A','A')">Physical parts</button>
<button onclick="answer('B','A')">Software</button>

<h3>2. CPU stands for?</h3>
<button onclick="answer('A','B')">Central Program Unit</button>
<button onclick="answer('B','B')">Central Processing Unit</button>

`;
}

}

function answer(selected,correct){
if(selected===correct){
score++;
alert("Correct ✅");
}else{
alert("Wrong ❌");
}
}

function showResult(){
document.getElementById("result").innerHTML =
"Your Score: " + score;
}

</script>

</head>

<body>

<h1 id="quizTitle">Quiz</h1>

<div class="quiz-box">

<div id="quiz"></div>

<button onclick="showResult()">📊 Show Result</button>

<p id="result" class="result"></p>

</div>

</body>
</html>
