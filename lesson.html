<!DOCTYPE html>
<html>
<head>
<title>Lesson Viewer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b2a4a;
color:white;
}

header{
background:#132f4c;
padding:15px;
text-align:center;
}

.viewer{
width:90%;
margin:20px auto;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:8px;
background:white;
}

.button{
display:block;
width:200px;
margin:20px auto;
padding:12px;
background:#f39c12;
color:white;
text-align:center;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<header>
<h2 id="lessonTitle">Lesson</h2>
</header>

<div class="viewer">

<iframe id="pdfViewer"></iframe>

<a id="quizLink" class="button">🧠 Take Quiz</a>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let file = params.get("file");
let title = params.get("title");

document.getElementById("pdfViewer").src = file;
document.getElementById("lessonTitle").innerHTML = title;

// 🔥 connect quiz to lesson
document.getElementById("quizLink").href =
"quiz.html?lesson=" + title;

</script>

</body>
</html>



</body>
</html>
